name: fro-bot

services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/gateway.Dockerfile
    depends_on:
      # Wait until mitmproxy has actually written the CA cert into the shared
      # volume, not just until its container has started. Without this the
      # gateway can launch with NODE_EXTRA_CA_CERTS pointing at a missing
      # file — Node silently ignores it and the egress allowlist is bypassed
      # for any request the gateway makes during the boot window.
      mitmproxy:
        condition: service_healthy
    environment:
      # Secret file paths (read via readSecret helper)
      DISCORD_TOKEN_FILE: /run/secrets/discord_token
      DISCORD_APPLICATION_ID_FILE: /run/secrets/discord_application_id
      S3_BUCKET_FILE: /run/secrets/s3_bucket
      S3_REGION_FILE: /run/secrets/s3_region
      S3_ENDPOINT_FILE: /run/secrets/s3_endpoint
      AWS_ACCESS_KEY_ID_FILE: /run/secrets/aws_access_key_id
      AWS_SECRET_ACCESS_KEY_FILE: /run/secrets/aws_secret_access_key
      AWS_SESSION_TOKEN_FILE: /run/secrets/aws_session_token
      # Optional — guild-scoped slash command registration (fast dev propagation)
      DISCORD_GUILD_ID_FILE: /run/secrets/discord_guild_id
      # Optional — opt into Discord privileged intents (MessageContent, GuildMembers)
      DISCORD_PRIVILEGED_INTENTS_FILE: /run/secrets/discord_privileged_intents
      # GitHub App credentials (required for repository access)
      GITHUB_APP_ID_FILE: /run/secrets/github_app_id
      GITHUB_APP_PRIVATE_KEY_FILE: /run/secrets/github_app_private_key
      # OpenCode bearer token — required; gateway will not start without this.
      # The workspace container reverse-proxies OpenCode and validates this token.
      WORKSPACE_OPENCODE_TOKEN_FILE: /run/secrets/workspace_opencode_token
      # Optional — override the OpenCode proxy URL (default: http://workspace:9200)
      WORKSPACE_OPENCODE_URL_FILE: /run/secrets/workspace_opencode_url
      # Optional — Discord role ID that gates mention authorization
      GATEWAY_TRIGGER_ROLE_ID_FILE: /run/secrets/gateway_trigger_role_id
      # Optional — announce/presence endpoint (opt-in). BOTH must be set together
      # to enable the HMAC-verified POST /v1/announce presence webhook, or NEITHER
      # (the endpoint stays disabled). Uncomment both lines AND both bind-mounts below.
      # GATEWAY_WEBHOOK_SECRET_FILE: /run/secrets/gateway_webhook_secret
      # GATEWAY_PRESENCE_CHANNEL_ID_FILE: /run/secrets/gateway_presence_channel_id
      # Optional — operator web surface (opt-in). ALL THREE must be set together to
      # enable the operator HTTP listener on gateway-net, or NONE (listener stays disabled).
      # The listener binds to GATEWAY_OPERATOR_BIND_HOST on gateway-net — never 0.0.0.0
      # or 127.0.0.1. TLS is terminated by the infra reverse proxy at PUBLIC_ORIGIN.
      # Uncomment all three lines when deploying the operator web surface.
      # GATEWAY_OPERATOR_BIND_HOST: 172.20.0.2   # gateway container's gateway-net IP
      # GATEWAY_OPERATOR_BIND_PORT: 4000
      # GATEWAY_OPERATOR_PUBLIC_ORIGIN: https://operator.example.com
      # Optional — canonical Fro Bot persona for the @-mention loop. When set, the
      # persona text is prepended to the Discord agent prompt (voice + behavior).
      # Absent → the loop falls back to built-in Discord guidance (fail-soft).
      # Provision the file from fro-bot/.github persona/fro-bot-persona.md.
      # GATEWAY_PERSONA_FILE: /run/secrets/gateway_persona
      # Optional — working-state UX for the @-mention loop.
      # live-status (default): posts a single live status message + typing indicator while the agent works.
      # typing-only: shows only the typing indicator (quieter; no status message).
      # GATEWAY_STATUS_MODE: live-status
      HTTPS_PROXY: http://mitmproxy:8080
      HTTP_PROXY: http://mitmproxy:8080
      NO_PROXY: workspace,localhost,127.0.0.1
      NODE_EXTRA_CA_CERTS: /etc/ssl/certs/mitmproxy-ca-cert.pem
    volumes:
      # Credentials — bind-mounted as accepted-risk (no Docker Swarm secrets in v1).
      # create_host_path: false ensures a missing source file causes a clear Compose
      # error at `docker compose up` time instead of Docker silently creating a directory.
      - type: bind
        source: ./secrets/discord-token
        target: /run/secrets/discord_token
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./secrets/discord-application-id
        target: /run/secrets/discord_application_id
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./secrets/s3-bucket
        target: /run/secrets/s3_bucket
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./secrets/s3-region
        target: /run/secrets/s3_region
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./secrets/s3-endpoint
        target: /run/secrets/s3_endpoint
        read_only: true
        bind:
          create_host_path: false
      # Optional — AWS credentials for explicit S3 authentication. Leave the
      # access-key-id and secret-access-key files empty (`touch deploy/secrets/aws-access-key-id`)
      # to fall back to the AWS SDK default credential chain (env, ~/.aws, IMDS).
      # AWS_SESSION_TOKEN is only needed for STS temporary credentials.
      - type: bind
        source: ./secrets/aws-access-key-id
        target: /run/secrets/aws_access_key_id
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./secrets/aws-secret-access-key
        target: /run/secrets/aws_secret_access_key
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./secrets/aws-session-token
        target: /run/secrets/aws_session_token
        read_only: true
        bind:
          create_host_path: false
      # Optional — guild-scoped slash command registration (fast dev propagation).
      # Create the file empty (`touch deploy/secrets/discord-guild-id`) to register
      # slash commands globally; the gateway treats empty files as unset.
      - type: bind
        source: ./secrets/discord-guild-id
        target: /run/secrets/discord_guild_id
        read_only: true
        bind:
          create_host_path: false
      # Optional — Discord privileged intents (MessageContent, GuildMembers).
      # Leave the file empty to use the non-privileged baseline (Guilds + GuildMessages only).
      # Set the contents to a comma-separated list of intent names to opt in.
      - type: bind
        source: ./secrets/discord-privileged-intents
        target: /run/secrets/discord_privileged_intents
        read_only: true
        bind:
          create_host_path: false
      # GitHub App credentials (required for repository access).
      # See deploy/README.md for setup instructions.
      - type: bind
        source: ./secrets/github-app-id
        target: /run/secrets/github_app_id
        read_only: true
        bind:
          create_host_path: false
      - type: bind
        source: ./secrets/github-app-private-key
        target: /run/secrets/github_app_private_key
        read_only: true
        bind:
          create_host_path: false
      # mitmproxy CA cert (written by mitmproxy on first start, read here for trust)
      - mitmproxy-certs:/etc/ssl/certs:ro
      # OpenCode bearer token — required; must match workspace-opencode-token.
      - type: bind
        source: ./secrets/workspace-opencode-token
        target: /run/secrets/workspace_opencode_token
        read_only: true
        bind:
          create_host_path: false
      # Optional — OpenCode proxy URL override (default: http://workspace:9200).
      # Touch the file empty to use the default.
      - type: bind
        source: ./secrets/workspace-opencode-url
        target: /run/secrets/workspace_opencode_url
        read_only: true
        bind:
          create_host_path: false
      # Optional — Discord role ID that gates mention authorization.
      # Touch the file empty to fall back to guild-level ManageChannels.
      - type: bind
        source: ./secrets/gateway-trigger-role-id
        target: /run/secrets/gateway_trigger_role_id
        read_only: true
        bind:
          create_host_path: false
      # Optional — announce/presence endpoint secrets (opt-in, both-or-neither).
      # Uncomment BOTH (and the two env entries above) to enable the announce endpoint.
      # - type: bind
      #   source: ./secrets/gateway-webhook-secret
      #   target: /run/secrets/gateway_webhook_secret
      #   read_only: true
      #   bind:
      #     create_host_path: false
      # - type: bind
      #   source: ./secrets/gateway-presence-channel-id
      #   target: /run/secrets/gateway_presence_channel_id
      #   read_only: true
      #   bind:
      #     create_host_path: false
      # Optional — Fro Bot persona for the @-mention loop (see GATEWAY_PERSONA_FILE above).
      # - type: bind
      #   source: ./secrets/gateway-persona
      #   target: /run/secrets/gateway_persona
      #   read_only: true
      #   bind:
      #     create_host_path: false
    networks:
      - gateway-net
      - sandbox-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'

  workspace:
    build:
      context: ..
      dockerfile: deploy/workspace.Dockerfile
    depends_on:
      mitmproxy:
        condition: service_healthy
    environment:
      # Egress proxy — same as gateway
      HTTPS_PROXY: http://mitmproxy:8080
      HTTP_PROXY: http://mitmproxy:8080
      NO_PROXY: localhost,127.0.0.1,workspace
      # Bearer token for the OpenCode reverse proxy.
      # The gateway presents this token when attaching to the workspace OpenCode server.
      WORKSPACE_OPENCODE_TOKEN_FILE: /run/secrets/workspace_opencode_token
      # OpenCode provider credentials (auth.json blob). Required for the @mention
      # loop; optional for clone-only deployments. The entrypoint validates it and
      # writes auth.json (0600) to OpenCode's data path — never exported as env.
      WORKSPACE_OPENCODE_AUTH_FILE: /run/secrets/workspace_opencode_auth
      # OpenCode model + provider config for the mention loop (operator config,
      # not secrets — the provider key lives in the auth.json secret above).
      # Mirrors the action's `model` + `opencode-config` inputs. Set both in
      # deploy/.env to route Claude/OpenAI through cliproxyapi, e.g.:
      #   WORKSPACE_OPENCODE_MODEL=anthropic/claude-sonnet-4-6
      #   WORKSPACE_OPENCODE_CONFIG={"provider":{"anthropic":{"options":{"baseURL":"https://cliproxy.fro.bot/v1"}}}}
      # The entrypoint overlays them onto the baked base config (plugin preserved).
      WORKSPACE_OPENCODE_MODEL: ${WORKSPACE_OPENCODE_MODEL:-}
      WORKSPACE_OPENCODE_CONFIG: ${WORKSPACE_OPENCODE_CONFIG:-}
    volumes:
      # workspace-opencode-token: shared secret for the bearer-token proxy.
      # The gateway reads the same value from WORKSPACE_OPENCODE_TOKEN_FILE.
      - type: bind
        source: ./secrets/workspace-opencode-token
        target: /run/secrets/workspace_opencode_token
        read_only: true
        bind:
          create_host_path: false
      # workspace-opencode-auth: OpenCode provider credentials (API-key auth.json
      # blob, e.g. {"anthropic":{"type":"api","key":"sk-..."}}). Required for the
      # mention loop; leave empty for clone-only deployments.
      - type: bind
        source: ./secrets/workspace-opencode-auth
        target: /run/secrets/workspace_opencode_auth
        read_only: true
        bind:
          create_host_path: false
      # mitmproxy CA cert (written by mitmproxy on first start). Mounted at a
      # dedicated path — NOT over /etc/ssl/certs — so the entrypoint's
      # update-ca-certificates can write the MERGED system bundle (base CAs +
      # mitmproxy) without the mount making the destination read-only. The
      # entrypoint trusts this for git/libcurl and the opencode binary, which
      # read the system store (NODE_EXTRA_CA_CERTS does not cover them).
      - mitmproxy-certs:/run/mitmproxy-certs:ro
      # workspace-repos: named volume for cloned repository checkouts.
      # Survives `docker compose up --force-recreate` and daemon upgrades.
      # WARNING: `docker compose down -v` removes this volume and destroys all
      # cloned repos. Mentioning Fro Bot in a bound channel after a volume loss
      # will rehydrate the checkout automatically.
      - workspace-repos:/workspace/repos
    # Port model:
    #   9100 — Hono API (/healthz, /clone) — sandbox-net only, no host mapping
    #   9200 — OpenCode bearer-token proxy — sandbox-net only, no host mapping
    #   54321 — raw OpenCode SDK server — loopback (127.0.0.1) ONLY, not published
    # No `ports:` entries: all access is container-to-container on sandbox-net.
    networks:
      - sandbox-net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    healthcheck:
      # /healthz returns 200 once the Hono clone API is up, independently of
      # OpenCode readiness (it reports opencode: ready|starting|down in the body).
      # localhost is in NO_PROXY so this probe does not traverse mitmproxy.
      test: [CMD-SHELL, 'curl -fsS http://127.0.0.1:9100/healthz || exit 1']
      interval: 10s
      timeout: 3s
      retries: 4
      start_period: 45s

  mitmproxy:
    image: mitmproxy/mitmproxy:11.1.3@sha256:e0deb0df7edf9f909053f274a067cd1cacb90f5c17d74459e1693179c0b98d8f
    command: >
      mitmdump
      -s /scripts/allowlist.py
      --listen-host 0.0.0.0
      --listen-port 8080
      --set confdir=/home/mitmproxy/.mitmproxy
      --set ssl_insecure=false
    environment:
      # Comma-separated list of exact object-store hosts to allow (e.g.
      # "my-bucket.s3.amazonaws.com,my-account.r2.cloudflarestorage.com").
      # The static allowlist does NOT include broad S3/R2 wildcards — set this
      # to the exact bucket host(s) your deployment uses. If unset or empty,
      # all S3/R2 traffic is blocked (fail-closed default).
      OBJECT_STORE_HOSTS: ${OBJECT_STORE_HOSTS:-}
      # Comma-separated list of additional exact egress hosts to allow through
      # the proxy (e.g. a self-hosted OpenCode proxy: "cliproxy.fro.bot").
      # Use this as an escape hatch for explicitly-justified workspace egress
      # hosts only — not as a general allowlist. If unset or empty, no extra
      # hosts are added (fail-closed default). Hosts are validated at import
      # time (wildcard/private-IP/port reject) and at connect time (DNS-rebinding
      # resolved-IP check). A malformed value prevents proxy startup.
      WORKSPACE_EGRESS_HOSTS: ${WORKSPACE_EGRESS_HOSTS:-}
    volumes:
      - ./mitmproxy/allowlist.py:/scripts/allowlist.py:ro
      # Named volume: mitmproxy writes CA here; gateway/workspace read it for trust
      - mitmproxy-certs:/home/mitmproxy/.mitmproxy
    networks:
      - sandbox-net # receives workspace traffic (internal)
      - egress-net # upstream leg: mitmproxy dials allowlisted hosts here
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: '3'
    healthcheck:
      # Gate dependent services on the CA actually existing in the shared
      # volume. mitmproxy generates ~/.mitmproxy/mitmproxy-ca-cert.pem on
      # first start; it takes ~1-3 seconds on cold-volume boot. Until this
      # check passes, gateway/workspace will not start.
      test: [CMD-SHELL, test -f /home/mitmproxy/.mitmproxy/mitmproxy-ca-cert.pem]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 30s

volumes:
  # Shared CA cert volume: mitmproxy writes, gateway + workspace read
  mitmproxy-certs:
  # Cloned repository checkouts — survives container recreation and daemon upgrades.
  # Destroyed by `docker compose down -v` (same as mitmproxy-certs).
  workspace-repos:

networks:
  # External-facing network for the gateway service.
  # The gateway attaches here as a deliberate trusted first-party exception: it must
  # reach Discord, GitHub, and object storage directly. This is an explicit TCB
  # decision — the gateway is trusted code under operator control, not the untrusted
  # workspace. The containment guarantee is that the WORKSPACE reaches the internet
  # only via mitmproxy; the gateway is not subject to that constraint.
  # Forward constraint: never give the workspace a gateway endpoint that performs
  # caller-directed outbound requests. If that changes, revisit the topology.
  gateway-net:
    driver: bridge
  # Isolated sandbox: workspace + mitmproxy receive side only.
  # internal:true — no host gateway, no direct internet egress for any
  # container attached here. Workspace stays on this network exclusively.
  sandbox-net:
    driver: bridge
    internal: true
  # mitmproxy's upstream leg. Only mitmproxy joins this network.
  # Workspace containment invariant: workspace → sandbox-net → mitmproxy → egress-net → internet.
  # (The gateway reaches the internet via gateway-net, not egress-net — see gateway-net comment above.)
  egress-net:
    driver: bridge
