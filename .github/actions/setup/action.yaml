---
name: Setup Node.js and pnpm
description: Sets up pnpm package manager and Node.js with dependency caching

inputs:
  node-version:
    description: Node.js version to use. If not provided, reads from .node-version file.
    required: false
  install-dependencies:
    description: Whether to run pnpm bootstrap after setup
    required: false
    default: 'true'

outputs:
  node-version:
    description: The resolved Node.js version
    value: ${{ steps.setup-node.outputs.node-version }}

runs:
  using: composite
  steps:
    - name: 📦 Setup pnpm
      uses: pnpm/action-setup@26f6d4f2c533a43e6b5da0b4a5dd983f98f7b49a # v6.0.4
      with:
        run_install: false

    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        cache: pnpm
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version == '' && '.node-version' || '' }}

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: pnpm install --no-strict-peer-dependencies --prefer-offline --loglevel warn
