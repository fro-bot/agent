---
name: Setup Node.js and Bun
description: Sets up Bun package manager and Node.js with dependency caching

inputs:
  node-version:
    description: Node.js version to use. If not provided, reads from .node-version file.
    required: false
  bun-version:
    description: Bun version to install. Defaults to 1.3.14.
    required: false
    default: 1.3.14
  install-dependencies:
    description: Whether to run bun install after setup
    required: false
    default: 'true'

outputs:
  node-version:
    description: The resolved Node.js version
    value: ${{ steps.setup-node.outputs.node-version }}

runs:
  using: composite
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version: ${{ inputs.bun-version }}

    - name: Setup Node.js
      id: setup-node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        node-version-file: ${{ inputs.node-version == '' && '.node-version' || '' }}

    - name: Cache Bun dependencies
      uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: bun install --frozen-lockfile
