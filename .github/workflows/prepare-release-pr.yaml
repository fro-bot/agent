---
name: Prepare Release PR

on:
  schedule:
    - cron: '0 20 * * 0,3'
  workflow_dispatch:
    inputs:
      force-release:
        description: Force a release even when no open release PR exists
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare Release PR
    runs-on: ubuntu-latest
    steps:
      - id: get-app-token
        name: Get GitHub App Installation Token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner}}

      - id: get-user-id
        name: Get GitHub App User ID and Setup Git user
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
        run: |
          name="${{ steps.get-app-token.outputs.app-slug }}[bot]"
          user_id=$(gh api "/users/${name}" --jq .id)
          email="${user_id}+${name}@users.noreply.github.com"
          echo "user-email=${email}" >> "$GITHUB_OUTPUT"
          echo "user-name=${name}" >> "$GITHUB_OUTPUT"
          git config --global user.email "${email}"
          git config --global user.name "${name}"

      - id: discover-release-pr
        name: Discover existing release PR
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
        run: |
          PR_NUMBER=$(gh pr list --head next --base release --state open --json number --jq '.[0].number // empty')
          echo "pr-number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"
          if [ -n "$PR_NUMBER" ]; then
            echo 'has-open-pr=true' >> "$GITHUB_OUTPUT"
          else
            echo 'has-open-pr=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout `release` branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          filter: blob:none
          ref: release
          show-progress: false
          token: ${{ steps.get-app-token.outputs.token }}

      - name: Reset synthetic release candidate to last release tag
        run: |
          last_tag=$(git tag --list 'v*' --sort=-version:refname | head -1)
          echo "Resetting synthetic release candidate to ${last_tag}"
          git reset --hard "${last_tag}"

      - name: Merge `main` into synthetic release candidate
        run: |
          git fetch origin main
          git merge --no-ff -Xtheirs -m 'skip: merge main [skip release]' origin/main

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup

      - name: Push synthetic release candidate to `next`
        run: git push --force-with-lease origin HEAD:next

      - env:
          GIT_AUTHOR_EMAIL: ${{ steps.get-user-id.outputs.user-email }}
          GIT_AUTHOR_NAME: ${{ steps.get-user-id.outputs.user-name }}
          GIT_COMMITTER_EMAIL: ${{ steps.get-user-id.outputs.user-email }}
          GIT_COMMITTER_NAME: ${{ steps.get-user-id.outputs.user-name }}
          GITHUB_TOKEN: ${{ steps.get-app-token.outputs.token }}
        id: semantic-release
        name: Dry-run semantic release
        run: |
          export GITHUB_REF=refs/heads/next GITHUB_SHA=$(git rev-parse HEAD) GITHUB_EVENT_NAME=push
          pnpm semantic-release --branches next --dry-run true --ci false

      - if: steps.semantic-release.outputs.version != ''
        name: Generate PR body
        run: |
          VERSION="${{ steps.semantic-release.outputs.version }}"
          COMMIT_LIST=$(git log origin/release..HEAD --format='* %s (%h)' --no-merges --max-count=50)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TITLE_SUFFIX=": v$VERSION"
          cat > /tmp/pr-body.md <<EOF
          ## Pending Release${TITLE_SUFFIX}

          This PR tracks changes pending release. Merge it with a merge commit to publish from the protected release branch without rewriting history.

          ### Commits Since Last Release
          EOF
          echo "${COMMIT_LIST:-No new commits}" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "---" >> /tmp/pr-body.md
          echo "*Auto-generated by the release pipeline. Updated: ${TIMESTAMP}*" >> /tmp/pr-body.md

      - if: steps.semantic-release.outputs.version != ''
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
        id: upsert-release-pr
        name: Create or Update Release PR
        run: |
          PR_NUMBER="${{ steps.discover-release-pr.outputs.pr-number }}"
          VERSION="${{ steps.semantic-release.outputs.version }}"
          TITLE="chore(release): pending release${VERSION:+ v${VERSION}}"
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file /tmp/pr-body.md
          else
            gh pr create --head next --base release --title "$TITLE" --body-file /tmp/pr-body.md
            PR_NUMBER=$(gh pr list --head next --base release --state open --json number --jq '.[0].number // empty')
          fi
          echo "pr-number=${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - if: steps.semantic-release.outputs.version != ''
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ steps.upsert-release-pr.outputs.pr-number }}
        name: Wait for release PR mergeability
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo 'Missing release PR number after upsert'
            exit 1
          fi
          attempt=0
          while [ "$attempt" -lt 10 ]; do
            MERGE_STATE=$(gh pr view "$PR_NUMBER" --json mergeStateStatus --jq '.mergeStateStatus')
            if [ "$MERGE_STATE" = 'DIRTY' ] || [ "$MERGE_STATE" = 'BLOCKED' ]; then
              echo "Release PR is not mergeable: ${MERGE_STATE}"
              exit 1
            fi
            if [ "$MERGE_STATE" = 'CLEAN' ] || [ "$MERGE_STATE" = 'HAS_HOOKS' ] || [ "$MERGE_STATE" = 'UNSTABLE' ]; then
              exit 0
            fi
            sleep 2
            attempt=$((attempt + 1))
          done
          echo 'Timed out waiting for release PR mergeability'
          exit 1

      - if: steps.semantic-release.outputs.version == '' && steps.discover-release-pr.outputs.has-open-pr == 'true'
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ steps.discover-release-pr.outputs.pr-number }}
        name: Close stale pending release PR
        run: gh pr close "$PR_NUMBER" --comment "Closing stale pending release PR because the latest dry-run predicts no release."

      - if: steps.semantic-release.outputs.version == ''
        name: Delete stale `next` branch
        run: git push origin --delete next || true

      - id: merge-policy
        if: steps.semantic-release.outputs.version != ''
        name: Decide whether to merge release PR now
        run: |
          SHOULD_MERGE=false
          if [ "${{ github.event_name }}" = 'schedule' ]; then
            SHOULD_MERGE=true
          fi
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ] && [ "${{ github.event.inputs.force-release }}" = 'true' ]; then
            SHOULD_MERGE=true
          fi
          if [ "${{ github.event_name }}" = 'workflow_dispatch' ] && [ "${{ steps.discover-release-pr.outputs.has-open-pr }}" = 'true' ]; then
            SHOULD_MERGE=true
          fi
          echo "should-merge=${SHOULD_MERGE}" >> "$GITHUB_OUTPUT"

      - if: steps.semantic-release.outputs.version != '' && steps.merge-policy.outputs.should-merge == 'true'
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
          PR_NUMBER: ${{ steps.upsert-release-pr.outputs.pr-number }}
        name: Merge release PR with merge commit
        run: |
          if [ -n "$PR_NUMBER" ]; then
            gh pr merge "$PR_NUMBER" --merge --delete-branch=false
          fi
