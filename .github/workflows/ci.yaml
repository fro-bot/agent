---
name: CI

on:
  merge_group:
  pull_request:
    branches: [main]
    types: [opened, synchronize, ready_for_review, reopened]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: true

# Restrict default token permissions; each job grants only what it needs.
permissions: {}

defaults:
  run:
    shell: 'bash -Eeuxo pipefail {0}'

jobs:
  setup:
    name: Setup
    outputs:
      should-build: ${{ contains(steps.filter.outputs.changes, 'should-build') }}
      should-lint: ${{ contains(steps.filter.outputs.changes, 'should-lint') }}
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js and pnpm
        id: setup
        uses: ./.github/actions/setup
      - id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            config: &config
              - .github/**
              - '**.json5?'
              - '**.md'
              - '**.yaml'
              - '**.yml'
              - deploy/**
            dist-changed: &dist-changed
              - dist/**
            src-changed: &src-changed
              - apps/**
              - assets/**
              - packages/**
              - src/**
              - action.yaml
              - package.json
              - tsconfig*.json
              - tsdown.config.ts
            should-lint:
              - added|modified: *config
              - added|modified: *src-changed
              - scripts/** # Lint changes to CI scripts even if no src changes, since they can affect linting
            should-build:
              - added|modified: *config
              - added|modified: *dist-changed
              - added|modified: *src-changed

  lint:
    if: ${{ needs.setup.outputs.should-lint == 'true' }}
    name: Lint
    needs: [setup]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - run: pnpm lint

  build:
    if: ${{ github.event_name == 'push' || needs.setup.outputs.should-build == 'true' }}
    name: Build
    needs: [setup]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Rebuild the dist/ directory
        run: pnpm build
      - name: Compare the expected and actual dist/ directories
        run: |
          if [ "$(git diff --ignore-space-at-eol dist/ | wc -l)" -gt "0" ]; then
            echo "Detected uncommitted changes after build.  See status below:"
            git diff --text
            exit 1
          fi
        id: diff
      # If dist/ was different than expected, upload the expected version as an artifact
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ failure() && steps.diff.conclusion == 'failure' }}
        with:
          name: dist
          path: dist/

  test:
    name: Test
    needs: [setup, build]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Run tests
        run: pnpm test

  test-action:
    if: >-
      github.event_name != 'push' && (
        github.event.pull_request == null ||
        (
          !github.event.pull_request.head.repo.fork &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]') &&
          (github.event.pull_request.user.login || '') != 'fro-bot'
        )
      )
    name: Test GitHub Action
    needs: build
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PR_REVIEW_PROMPT: |
        Focus your review on:
        - Correctness and edge cases
        - Security implications
        - Breaking changes to public API
        - Test coverage for new/changed behavior
        Skip style nits — the linter handles those.

        Use inline comments for file-specific issues. Reserve the review
        body for the structured summary below.

        Do NOT push commits, modify code, or create branches. Review only.

        You MUST structure your review using exactly these headings:
        ## Verdict: [PASS | CONDITIONAL | REJECT]
        CONDITIONAL = can merge after addressing the listed blocking issues.
        ### Blocking issues
        ### Non-blocking concerns
        ### Missing tests
        ### Risk assessment (LOW/MED/HIGH): likelihood of regression, security exposure, or blast radius
        If a section has no items, write "None" under the heading. Do not omit any heading.

        Submit the review with the event matching your verdict: PASS must use
        `gh pr review --approve`; CONDITIONAL or REJECT must use
        `gh pr review --request-changes`. A comment-only review does not count
        and leaves the PR blocked on review-required.
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event.pull_request.head.sha || '' }}
          token: ${{ secrets.FRO_BOT_PAT }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup

      - name: Test main action
        uses: ./
        env:
          OPENCODE_PROMPT_ARTIFACT: 'true'
          PROMPT: >-
            ${{
              (github.event_name == 'pull_request' && env.PR_REVIEW_PROMPT)
              || ''
            }}
        with:
          auth-json: ${{ secrets.AUTH_JSON }}
          github-token: ${{ secrets.FRO_BOT_PAT }}
          model: ${{ vars.FRO_BOT_MODEL }}
          omo-providers: ${{ secrets.OMO_PROVIDERS }}
          opencode-config: ${{ secrets.OPENCODE_CONFIG }}
          prompt: ${{ env.PROMPT }}

      - if: always()
        name: Introspect main action execution
        run: |
          echo "Installed versions:"
          which bun && bun --version || true
          which opencode && opencode --version || true

          echo "OPENCODE_CONFIG_CONTENT (should include @fro.bot/systematic and disabled-mode defaults):"
          echo "$OPENCODE_CONFIG_CONTENT" | jq . 2>/dev/null || echo "$OPENCODE_CONFIG_CONTENT"

          echo "$OPENCODE_CONFIG_CONTENT" | jq -e '.default_agent == "build"'
          echo "$OPENCODE_CONFIG_CONTENT" | jq -e '[(.plugin // [])[] | select(type == "string" and startswith("oh-my-openagent"))] | length == 0'
          echo "$OPENCODE_CONFIG_CONTENT" | jq -e '[(.plugin // [])[] | select(type == "string" and startswith("@fro.bot/systematic"))] | length == 1'

          echo "OpenCode config files:"
          [ ! -d ~/.config/opencode ] || find ~/.config/opencode -maxdepth 2 -type f | sort
          [ -f ~/.config/opencode/opencode.json ] && cat ~/.config/opencode/opencode.json || true
          [ -f ~/.config/opencode/oh-my-openagent.json ] && cat ~/.config/opencode/oh-my-openagent.json || true
          [ -f ~/.config/opencode/oh-my-opencode.json ] && echo "Legacy oMo config:" && cat ~/.config/opencode/oh-my-opencode.json || true

          echo "OpenCode shared files:"
          ls -lA ~/.local/share/opencode || true
          ls -lA ~/.local/share/opencode/log || true

          echo "Check oh-my-openagent disabled-mode absence:"
          if command -v bunx; then
            echo "bunx is present; skipping oMo doctor because enable-omo is false"
          else
            echo "bunx is absent as expected when enable-omo is false"
          fi
          [ ! -f ~/.config/opencode/oh-my-openagent.json ]
          [ ! -f ~/.config/opencode/oh-my-opencode.json ]

          echo "OpenCode storage folder:"
          ls -lA ~/.local/share/opencode/storage || true

          echo "OpenCode cache files:"
          ls -lA ~/.cache/opencode || true

          echo "OpenCode state files:"
          ls -lA ~/.local/state/opencode || true

  gateway-smoke:
    if: ${{ github.event_name == 'push' || needs.setup.outputs.should-build == 'true' }}
    name: Gateway Image Smoke Test
    needs: [setup]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Build runtime
        run: pnpm --filter @fro-bot/runtime build
      - name: Build gateway
        run: pnpm --filter @fro-bot/gateway build
      - name: Assert no bare @fro-bot/runtime import in gateway bundle
        run: |
          if grep -q 'from "@fro-bot/runtime"' packages/gateway/dist/main.mjs; then
            echo "REGRESSION: gateway dist has bare @fro-bot/runtime import"
            exit 1
          fi
          echo "OK: no bare @fro-bot/runtime import found in gateway bundle"
      - name: Build gateway Docker image
        run: docker build -f deploy/gateway.Dockerfile -t fro-bot-gateway:smoke .
      - name: Smoke-test gateway image (assert config load, not module crash)
        run: |
          set +e
          output="$(timeout 60s docker run --rm fro-bot-gateway:smoke 2>&1)"
          status=$?
          set -e
          echo "--- docker run output ---"
          echo "$output"
          echo "--- exit status: $status ---"
          if [ "$status" -eq 124 ]; then
            echo "REGRESSION: gateway image hung on boot (timed out)"
            exit 1
          fi
          test "$status" -ne 0
          echo "$output" | grep -q "Missing required secret: DISCORD_TOKEN"
          if echo "$output" | grep -q "ERR_MODULE_NOT_FOUND"; then
            echo "REGRESSION: module resolution failed (ERR_MODULE_NOT_FOUND)"
            exit 1
          fi
          echo "OK: gateway reached config loading (DISCORD_TOKEN check), no module-resolution crash"

  workspace-smoke:
    if: ${{ github.event_name == 'push' || needs.setup.outputs.should-build == 'true' }}
    name: Workspace Image Smoke Test
    needs: [setup]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - name: Run deploy/scripts unit tests
        run: node --test deploy/scripts/*.test.mjs
      - name: Build workspace Docker image
        run: docker build -f deploy/workspace.Dockerfile -t fro-bot-workspace:smoke .
      - name: Smoke-test workspace image (clone API boots independently of OpenCode)
        run: |
          set -e
          # No CA is mounted in CI, so the entrypoint skips proxy trust immediately
          # (MITMPROXY_CA_WAIT_SECONDS=0). A dummy token keeps the supervisor alive
          # (main.ts exits without it). NO_PROXY=* keeps the local health probe direct.
          cid="$(docker run -d \
            -e WORKSPACE_OPENCODE_TOKEN=dummy-smoke-token \
            -e MITMPROXY_CA_WAIT_SECONDS=0 \
            -e NO_PROXY='*' \
            fro-bot-workspace:smoke)"
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT

          # The clone API (:9100) must come up independently of OpenCode readiness.
          ok=false
          for _ in $(seq 1 30); do
            if docker exec "$cid" curl -fsS http://127.0.0.1:9100/healthz >/dev/null 2>&1; then
              ok=true
              break
            fi
            sleep 1
          done

          logs="$(docker logs "$cid" 2>&1)"
          echo "--- workspace logs ---"
          echo "$logs"

          if [ "$ok" != "true" ]; then
            echo "REGRESSION: /healthz did not return 200 within 30s"
            exit 1
          fi
          echo "$logs" | grep -q "workspace-agent listening on 0.0.0.0:9100"
          if echo "$logs" | grep -q "ERR_MODULE_NOT_FOUND"; then
            echo "REGRESSION: module resolution failed (ERR_MODULE_NOT_FOUND)"
            exit 1
          fi
          # Prove the opencode binary is on PATH and runs (musl compatibility).
          docker exec "$cid" opencode --version
          # Auth absent (no secret mounted) → fail-soft: boots, logs auth: absent.
          echo "$logs" | grep -q "auth: absent"
          # No model/provider overlay → base config stands: Systematic plugin baked,
          # NO model field (deployer supplies it), and the overlay-absent log line.
          echo "$logs" | grep -q "provider-overlay=none"
          docker exec "$cid" sh -c 'grep -q "@fro.bot/systematic" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c '! grep -q "\"model\"" /root/.config/opencode/opencode.json'
          echo "OK: clone API up on :9100, opencode present, base config (no baked model), auth fail-soft"
      - name: Smoke-test auth provisioning (valid blob → auth.json written 0600)
        run: |
          set -e
          # NOTE: This proves the entrypoint VALIDATES and WRITES the credential
          # file with correct perms — NOT that the credential authenticates or
          # that a model-backed turn completes. A real provider turn needs live
          # credentials and is covered by manual deploy validation (plan R4).
          printf '{"anthropic":{"type":"api","key":"sk-dummy-not-real"}}' > /tmp/auth.json
          cid="$(docker run -d \
            -e WORKSPACE_OPENCODE_TOKEN=dummy-smoke-token \
            -e MITMPROXY_CA_WAIT_SECONDS=0 \
            -e NO_PROXY='*' \
            -v /tmp/auth.json:/run/secrets/workspace_opencode_auth:ro \
            fro-bot-workspace:smoke)"
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          ok=false
          for _ in $(seq 1 30); do
            if docker exec "$cid" curl -fsS http://127.0.0.1:9100/healthz >/dev/null 2>&1; then ok=true; break; fi
            sleep 1
          done
          logs="$(docker logs "$cid" 2>&1)"
          echo "--- workspace logs ---"; echo "$logs"
          [ "$ok" = "true" ] || { echo "REGRESSION: /healthz down with auth provisioned"; exit 1; }
          echo "$logs" | grep -q "auth: provisioned"
          # auth.json written with 0600 perms; content must NOT appear in logs.
          docker exec "$cid" sh -c 'test "$(stat -c %a /root/.local/share/opencode/auth.json)" = "600"'
          if echo "$logs" | grep -q "sk-dummy-not-real"; then
            echo "REGRESSION: auth secret leaked into logs"; exit 1
          fi
          echo "OK: valid auth blob → auth.json written 0600, auth: provisioned, no secret in logs"
      - name: Smoke-test auth validation (malformed blob → fail fast)
        run: |
          set -e
          # Wrong credential type (no API key) must be rejected at startup, not
          # deferred to a cryptic turn-time failure.
          printf '{"anthropic":{"type":"oauth"}}' > /tmp/bad-auth.json
          set +e
          output="$(docker run --rm \
            -e WORKSPACE_OPENCODE_TOKEN=dummy-smoke-token \
            -e MITMPROXY_CA_WAIT_SECONDS=0 \
            -e NO_PROXY='*' \
            -v /tmp/bad-auth.json:/run/secrets/workspace_opencode_auth:ro \
            fro-bot-workspace:smoke 2>&1)"
          status=$?
          set -e
          echo "--- output ---"; echo "$output"
          [ "$status" -ne 0 ] || { echo "REGRESSION: malformed auth blob did not fail startup"; exit 1; }
          echo "$output" | grep -q "auth secret is present but invalid"
          echo "OK: malformed auth blob rejected at startup"
      - name: Smoke-test model + provider overlay (cliproxyapi-shaped config applied)
        run: |
          set -e
          # Mirrors the production deploy: a provider baseURL block + model string,
          # the same shape marcusrbrown/infra feeds the action for cliproxyapi.
          # The overlay is deliberately HOSTILE — it also sets plugin:[] and
          # autoupdate:true to prove the merger preserves the baked Systematic
          # plugin and keeps the OpenCode version pin (autoupdate stays false).
          cid="$(docker run -d \
            -e WORKSPACE_OPENCODE_TOKEN=dummy-smoke-token \
            -e MITMPROXY_CA_WAIT_SECONDS=0 \
            -e NO_PROXY='*' \
            -e WORKSPACE_OPENCODE_MODEL='anthropic/claude-sonnet-4-6' \
            -e 'WORKSPACE_OPENCODE_CONFIG={"autoupdate":true,"plugin":[],"provider":{"anthropic":{"options":{"baseURL":"https://cliproxy.fro.bot/v1"}}}}' \
            fro-bot-workspace:smoke)"
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          ok=false
          for _ in $(seq 1 30); do
            if docker exec "$cid" curl -fsS http://127.0.0.1:9100/healthz >/dev/null 2>&1; then ok=true; break; fi
            sleep 1
          done
          logs="$(docker logs "$cid" 2>&1)"
          echo "--- workspace logs ---"; echo "$logs"
          [ "$ok" = "true" ] || { echo "REGRESSION: /healthz down with config overlay"; exit 1; }
          echo "$logs" | grep -q "provider-overlay=applied"
          # Effective config carries the overlaid model + provider baseURL, AND the
          # hostile overlay could NOT drop the plugin or re-enable autoupdate.
          docker exec "$cid" sh -c 'grep -q "\"model\": \"anthropic/claude-sonnet-4-6\"" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c 'grep -q "cliproxy.fro.bot/v1" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c 'grep -q "@fro.bot/systematic" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c 'grep -q "\"autoupdate\": false" /root/.config/opencode/opencode.json'
          echo "OK: overlay applied; Systematic plugin preserved + autoupdate stays pinned despite hostile overlay"
      - name: Smoke-test config validation (malformed overlay → fail fast)
        run: |
          set -e
          set +e
          output="$(docker run --rm \
            -e WORKSPACE_OPENCODE_TOKEN=dummy-smoke-token \
            -e MITMPROXY_CA_WAIT_SECONDS=0 \
            -e NO_PROXY='*' \
            -e 'WORKSPACE_OPENCODE_CONFIG={not valid json' \
            fro-bot-workspace:smoke 2>&1)"
          status=$?
          set -e
          echo "--- output ---"; echo "$output"
          [ "$status" -ne 0 ] || { echo "REGRESSION: malformed config overlay did not fail startup"; exit 1; }
          echo "$output" | grep -q "opencode config overlay is invalid"
          echo "OK: malformed config overlay rejected at startup"
      - name: Smoke-test combined auth + model + provider overlay
        run: |
          set -e
          printf '{"anthropic":{"type":"api","key":"sk-dummy-not-real"}}' > /tmp/auth.json
          cid="$(docker run -d \
            -e WORKSPACE_OPENCODE_TOKEN=dummy-smoke-token \
            -e MITMPROXY_CA_WAIT_SECONDS=0 \
            -e NO_PROXY='*' \
            -e WORKSPACE_OPENCODE_MODEL='anthropic/claude-sonnet-4-6' \
            -e 'WORKSPACE_OPENCODE_CONFIG={"provider":{"anthropic":{"options":{"baseURL":"https://cliproxy.fro.bot/v1"}}}}' \
            -v /tmp/auth.json:/run/secrets/workspace_opencode_auth:ro \
            fro-bot-workspace:smoke)"
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          ok=false
          for _ in $(seq 1 30); do
            if docker exec "$cid" curl -fsS http://127.0.0.1:9100/healthz >/dev/null 2>&1; then ok=true; break; fi
            sleep 1
          done
          logs="$(docker logs "$cid" 2>&1)"
          echo "--- workspace logs ---"; echo "$logs"
          [ "$ok" = "true" ] || { echo "REGRESSION: /healthz down with combined auth+model+overlay"; exit 1; }
          echo "$logs" | grep -q "auth: provisioned"
          echo "$logs" | grep -q "provider-overlay=applied"
          docker exec "$cid" sh -c 'test "$(stat -c %a /root/.local/share/opencode/auth.json)" = "600"'
          docker exec "$cid" sh -c 'grep -q "\"model\": \"anthropic/claude-sonnet-4-6\"" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c 'grep -q "cliproxy.fro.bot/v1" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c 'grep -q "@fro.bot/systematic" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c 'grep -q "\"autoupdate\": false" /root/.config/opencode/opencode.json'
          echo "OK: combined auth + model + provider overlay — all assertions passed"
      - name: Smoke-test model-only overlay
        run: |
          set -e
          cid="$(docker run -d \
            -e WORKSPACE_OPENCODE_TOKEN=dummy-smoke-token \
            -e MITMPROXY_CA_WAIT_SECONDS=0 \
            -e NO_PROXY='*' \
            -e WORKSPACE_OPENCODE_MODEL='anthropic/claude-sonnet-4-6' \
            fro-bot-workspace:smoke)"
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          ok=false
          for _ in $(seq 1 30); do
            if docker exec "$cid" curl -fsS http://127.0.0.1:9100/healthz >/dev/null 2>&1; then ok=true; break; fi
            sleep 1
          done
          logs="$(docker logs "$cid" 2>&1)"
          echo "--- workspace logs ---"; echo "$logs"
          [ "$ok" = "true" ] || { echo "REGRESSION: /healthz down with model-only overlay"; exit 1; }
          echo "$logs" | grep -q "provider-overlay=none"
          docker exec "$cid" sh -c 'grep -q "\"model\": \"anthropic/claude-sonnet-4-6\"" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c '! grep -q "\"provider\"" /root/.config/opencode/opencode.json'
          docker exec "$cid" sh -c 'grep -q "@fro.bot/systematic" /root/.config/opencode/opencode.json'
          echo "OK: model-only overlay — model present, no provider key, plugin preserved"
      - name: Smoke-test empty auth file (whitespace → absent, clone-only boots)
        run: |
          set -e
          printf '   \n  ' > /tmp/empty-auth.json
          cid="$(docker run -d \
            -e WORKSPACE_OPENCODE_TOKEN=dummy-smoke-token \
            -e MITMPROXY_CA_WAIT_SECONDS=0 \
            -e NO_PROXY='*' \
            -v /tmp/empty-auth.json:/run/secrets/workspace_opencode_auth:ro \
            fro-bot-workspace:smoke)"
          cleanup() { docker rm -f "$cid" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          ok=false
          for _ in $(seq 1 30); do
            if docker exec "$cid" curl -fsS http://127.0.0.1:9100/healthz >/dev/null 2>&1; then ok=true; break; fi
            sleep 1
          done
          logs="$(docker logs "$cid" 2>&1)"
          echo "--- workspace logs ---"; echo "$logs"
          [ "$ok" = "true" ] || { echo "REGRESSION: /healthz down with whitespace-only auth"; exit 1; }
          echo "$logs" | grep -q "auth: absent"
          docker exec "$cid" sh -c '! test -f /root/.local/share/opencode/auth.json'
          echo "OK: whitespace auth file treated as absent — clone-only boots, no auth.json written"

  dependency-review:
    if: ${{ github.event_name == 'pull_request' }}
    name: Dependency Review
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Dependency Review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0

  release:
    concurrency:
      group: release
      cancel-in-progress: false
    env:
      DRY_RUN: ${{ github.ref_name != github.event.repository.default_branch }}
      RELEASE_BRANCH: release
    name: Release
    needs: [setup, lint, test, build]
    outputs:
      commit: ${{ steps.merge.outputs.commit }}
      version: ${{ steps.release-preview.outputs.next_version }}
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - id: get-app-token
        name: Get GitHub App Installation Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.APPLICATION_ID }}
          private-key: ${{ secrets.APPLICATION_PRIVATE_KEY }}
          owner: ${{ github.repository_owner}}
      - id: get-user-id
        name: Get GitHub App User ID and Setup Git user
        env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
        run: |
          name="${{ steps.get-app-token.outputs.app-slug }}[bot]"
          user_id=$(gh api "/users/${name}" --jq .id)
          email="${user_id}+${name}@users.noreply.github.com"
          echo "user-email=${email}" >> "$GITHUB_OUTPUT"
          echo "user-name=${name}" >> "$GITHUB_OUTPUT"
          git config --global user.email "${email}"
          git config --global user.name "${name}"
      - name: Checkout `${{ env.RELEASE_BRANCH }}` release branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_BRANCH }}
          filter: blob:none
          show-progress: false
          token: ${{ steps.get-app-token.outputs.token }}
      # Reset release to the last tag so the merge base is clean.
      # Without this, semantic-release's dist/ commits on the release branch
      # cause rename/rename conflicts that -Xtheirs cannot resolve.
      - name: Reset `${{ env.RELEASE_BRANCH }}` to last release tag
        run: |
          last_tag=$(git tag --list 'v*' --sort=-version:refname | head -1)
          echo "Resetting ${{ env.RELEASE_BRANCH }} to ${last_tag}"
          git reset --hard "${last_tag}"
      - if: ${{ github.event_name == 'pull_request' }}
        name: Fetch PR
        run: git fetch origin +${{ github.sha }}:${{ github.ref }}
      - id: merge
        name: Merge `main` into `${{ env.RELEASE_BRANCH }}` release
        run: |
          git merge --no-ff -Xtheirs -m 'skip: merge (${{ github.sha }}) [skip release]' ${{ github.sha }}
          echo "commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup
      - id: release-preview
        name: Release Preview
        run: node --experimental-strip-types --experimental-transform-types scripts/release/preview-next-release.ts --to ${{ steps.merge.outputs.commit }}
      - if: env.DRY_RUN != 'true'
        name: Push `next` branch
        run: |
          git branch -f next HEAD
          git push --no-verify --force-with-lease origin HEAD:next
      - if: env.DRY_RUN != 'true' && steps.release-preview.outputs.next_version != ''
        name: Generate PR Body
        run: |
          VERSION="${{ steps.release-preview.outputs.next_version }}"
          last_tag=$(git tag --list 'v*' --sort=-version:refname | head -1)
          COMMIT_LIST=$(git log "${last_tag}..HEAD" --format='* %s (%h)' --no-merges --max-count=50)
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          TITLE_SUFFIX=": v${VERSION}"
          cat > /tmp/pr-body.md <<EOF
          ## Pending Release${TITLE_SUFFIX}

          This PR tracks changes pending release. Released on the next auto-release cycle (Sunday/Wednesday) or via manual dispatch.

          **Merge this PR to trigger a release.** Releases also run automatically on Sunday/Wednesday at 20:00 UTC, or via manual workflow dispatch.

          ### Commits Since Last Release
          EOF
          echo "${COMMIT_LIST:-No new commits}" >> /tmp/pr-body.md
          echo "" >> /tmp/pr-body.md
          echo "---" >> /tmp/pr-body.md
          echo "*Auto-generated by the release pipeline. Updated: ${TIMESTAMP}*" >> /tmp/pr-body.md
      - env:
          GH_TOKEN: ${{ steps.get-app-token.outputs.token }}
        if: env.DRY_RUN != 'true' && steps.release-preview.outputs.next_version != ''
        name: Create or Update Release PR
        run: |
          PR_NUMBER=$(gh pr list --head next --base ${{ env.RELEASE_BRANCH }} --state open --json number --jq '.[0].number')
          VERSION="${{ steps.release-preview.outputs.next_version }}"
          TITLE="chore(release): pending release v${VERSION}"
          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --title "$TITLE" --body-file /tmp/pr-body.md
          else
            gh pr create \
              --head next \
              --base ${{ env.RELEASE_BRANCH }} \
              --title "$TITLE" \
              --body-file /tmp/pr-body.md
          fi
