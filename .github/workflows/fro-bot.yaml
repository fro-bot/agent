---
name: Fro Bot

run-name: >-
  ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.correlation-id != '' && format('Fro Bot · release-notes · {0}', github.event.inputs.correlation-id) || 'Fro Bot' }}

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  discussion_comment:
    types: [created]
  issues:
    types: [opened, edited]
  schedule:
    - cron: '30 15 * * *' # Daily DMR
    - cron: '0 20 * * 0' # Weekly wiki update (must match PROMPT expression below)
  workflow_dispatch:
    inputs:
      prompt:
        description: Custom prompt for the Fro Bot agent (takes precedence over use-schedule-prompt and use-wiki-prompt)
        required: false
      use-schedule-prompt:
        description: Run with the built-in Daily Maintenance Report prompt
        type: boolean
        default: false
      use-wiki-prompt:
        description: Run with the built-in Wiki update prompt
        type: boolean
        default: false
      model:
        description: Model override for the Fro Bot agent (e.g. anthropic/claude-haiku-4-5)
        required: false
      correlation-id:
        description: Audit correlation token forwarded by an external dispatcher (e.g. the release-notes narration step)
        required: false
  # Called by other workflows (e.g. harness-release) to run Fro Bot with a
  # specific model and/or prompt. Secrets are inherited from the caller via
  # `secrets: inherit` — no secret passthrough inputs needed.
  # NOTE: when called, github.event_name reflects the CALLER's triggering event
  # (e.g. 'workflow_dispatch' or 'push'), not 'workflow_call'.
  workflow_call:
    inputs:
      model:
        description: Override the model (e.g. anthropic/claude-sonnet-4-6). Falls back to vars.FRO_BOT_MODEL when omitted.
        type: string
        required: false
      prompt:
        description: The prompt text to run. When set, takes highest priority over all other prompt sources.
        type: string
        required: false
      response-mode:
        description: >-
          Controls whether the agent posts GitHub comments/reviews. Values: github, none.
          'github' (default): agent posts exactly one comment or review per run.
          'none': non-posting automation; final assistant message and job log are the response surface.
        type: string
        required: false

permissions:
  contents: read

concurrency:
  group: >-
    fro-bot-${{
      github.event.issue.number ||
      github.event.pull_request.number ||
      github.event.discussion.number ||
      github.run_id
    }}
  cancel-in-progress: false

env:
  SCHEDULE_PROMPT: |
    Perform daily repository maintenance and update a SINGLE rolling issue titled
    "Daily Maintenance Report" in this repository.

    Search for an open issue with this exact title. If multiple matches exist,
    use the most recently updated one. If no open issue exists, create it.
    If the most recent matching issue is closed, reopen it instead of creating
    a new one.

    Append a new dated section for each run using "## YYYY-MM-DD (UTC)".
    To keep the issue bounded: after appending today's section, replace any
    individual daily sections older than 14 days with a single
    "## Historical Summary" section that lists only the count of prior runs
    and any items that remained unresolved across those runs. If a Historical Summary already exists, update it in place — do not create a second one.

    Include links only (no full content duplication). Keep it concise and actionable.
    Flag items that appear in the stale list for the first time (not present in the previous dated section) with a ★ marker.

    Sections (in order):
    - Summary metrics (issues opened since last run, currently open PRs, stale
      issues/PRs count, main branch check status, security alerts if accessible)
    - Stale issues (no activity >30 days; recommend next step)
    - Stale PRs (no activity >7 days; stale >14 days)
    - Unassigned bugs (label bug, no assignee)
    - Recommended actions (bulleted checklist)
    - Notes (use "data unavailable" for any inaccessible data source)

    Do NOT comment on or modify individual issues/PRs. Do NOT apply labels.
    Do NOT open PRs. This run must update ONE issue only.

  WIKI_PROMPT: |
    You are maintaining a project wiki as an Obsidian vault in `docs/wiki/`.
    This wiki provides human-readable documentation for the fro-bot/agent project.

    == BRANCH WORKFLOW ==
    1. Check for an existing open wiki PR: `gh pr list --head fro-bot/wiki-update --state open --json number --jq '.[0].number // empty'`
    2. If branch `fro-bot/wiki-update` exists but has NO open PR, delete it: `git push origin --delete fro-bot/wiki-update || true`
    3. Create or checkout branch `fro-bot/wiki-update` from `main`
    4. After all changes, commit with message: `docs(wiki): update project wiki`
    5. Push branch and create or update PR targeting `main`
    6. Enable auto-merge: `gh pr merge <number> --auto --squash`
       If auto-merge fails, leave the PR open and note the failure in the PR body.

    == LINT PASS (run before writing) ==
    Check existing `docs/wiki/` pages for:
    - Broken wikilinks: verify each `[[Page Name]]` reference has a corresponding `Page Name.md` file
    - Orphan pages: verify each page (except index.md) has at least one inbound `[[wikilink]]` from another page
    - Stale pages: compare each page's `sources` frontmatter list against `git log` — if any listed source file changed since the page's `last-updated` date, mark it for update
    Fix any issues found inline during the update pass.

    == UPDATE STRATEGY ==
    Run `git log --oneline` to find commits since the last wiki update commit (look for `docs(wiki):` prefix).
    Identify which wiki pages' `sources` files were touched by those commits.
    Update ONLY those pages. Do not regenerate unchanged pages.

    If NO wiki pages exist yet (seed run), generate ALL canonical pages:
    - Architecture Overview (type: architecture)
    - Execution Lifecycle (type: architecture)
    - Session Persistence (type: subsystem)
    - Prompt Architecture (type: subsystem)
    - Setup and Configuration (type: subsystem)
    - Conventions and Patterns (type: convention)

    == PAGE SCHEMA ==
    Every wiki page MUST have this YAML frontmatter:
    ```yaml
    ---
    type: architecture | subsystem | convention
    last-updated: "YYYY-MM-DD"
    updated-by: "<commit SHA or session ID>"
    sources:
      - src/path/to/relevant/file.ts
      - RFCs/RFC-NNN-Name.md
    summary: "One-line description of what this page covers"
    ---
    ```

    == CONTENT GUIDANCE ==
    - Write for human developers, not agents. Clear prose, not bullet dumps.
    - DESCRIPTIVE (how the system works, why decisions were made), NOT prescriptive (what to do).
    - Use Obsidian wikilinks `[[Page Name]]` to cross-reference other wiki pages.
    - Cite source files by path. Reference RFCs by number.
    - Do NOT copy source code verbatim. Describe architecture and data flow.
    - Do NOT duplicate AGENTS.md prescriptive content.

    == INDEX UPDATE ==
    After page changes, update `docs/wiki/index.md`:
    - List each page with standard markdown links for GitHub: `[Page Name](Page%20Name.md)`
    - Include the page's `type` and `summary` from frontmatter
    - Organize by topic area

    == CONSTRAINTS ==
    - Do NOT modify AGENTS.md or any source code files.
    - Do NOT create issues or post comments.
    - This run must ONLY update files in `docs/wiki/` and create ONE PR.

jobs:
  fro-bot:
    if: >-
      (
        github.event.pull_request == null ||
        (
          !github.event.pull_request.head.repo.fork &&
          !endsWith(github.event.pull_request.user.login || '', '[bot]')
        )
      ) &&
      (
        inputs.prompt != '' ||
        (
          github.event_name == 'issues' &&
          !endsWith(github.event.issue.user.login || '', '[bot]') &&
          (github.event.issue.user.login || '') != 'fro-bot'
        ) ||
        github.event_name == 'schedule' ||
        github.event_name == 'workflow_dispatch' ||
        (
          (github.event_name == 'issue_comment' ||
           github.event_name == 'pull_request_review_comment' ||
           github.event_name == 'discussion_comment') &&
          contains(github.event.comment.body || '', '@fro-bot') &&
          (github.event.comment.user.login || '') != 'fro-bot' &&
          contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR"]'), github.event.comment.author_association || '')
        )
      )
    name: Fro Bot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ref: >-
            ${{
              (github.event.issue.pull_request && format('refs/pull/{0}/head', github.event.issue.number))
              || github.event.pull_request.head.sha
              || ''
            }}
          token: ${{ secrets.FRO_BOT_PAT }}

      - name: Setup Node.js and pnpm
        uses: ./.github/actions/setup

      - name: Run Fro Bot
        uses: ./
        env:
          OPENCODE_PROMPT_ARTIFACT: 'true'
          PROMPT: >-
            ${{
              (inputs.prompt != '' && inputs.prompt)
              || (github.event_name == 'workflow_dispatch' && github.event.inputs.prompt != '' && github.event.inputs.prompt)
              || (github.event_name == 'workflow_dispatch' && github.event.inputs.use-wiki-prompt == 'true' && env.WIKI_PROMPT)
              || (github.event_name == 'workflow_dispatch' && github.event.inputs.use-schedule-prompt == 'true' && env.SCHEDULE_PROMPT)
              || (github.event_name == 'schedule' && github.event.schedule == '0 20 * * 0' && env.WIKI_PROMPT)
              || (github.event_name == 'schedule' && env.SCHEDULE_PROMPT)
              || ''
            }}
        with:
          auth-json: ${{ secrets.AUTH_JSON }}
          github-token: ${{ secrets.FRO_BOT_PAT }}
          model: ${{ inputs.model || vars.FRO_BOT_MODEL }}
          # Release-notes narration (correlation-id-tagged) runs on stock OpenCode with
          # an explicit model override; oMo is skipped so its provider routing does not
          # interfere with the narration model.
          enable-omo: ${{ github.event.inputs.correlation-id != '' && 'false' || 'true' }}
          omo-providers: ${{ github.event.inputs.correlation-id != '' && '' || secrets.OMO_PROVIDERS }}
          opencode-config: ${{ secrets.OPENCODE_CONFIG }}
          # Wiki paths opt into branch-pr explicitly so delivery contract is
          # self-documenting and decoupled from prompt-wording drift. All other
          # manual paths use auto, which resolves to working-dir for prompts
          # without explicit branch/PR language (e.g., the daily DMR run).
          # See docs/plans/2026-04-17-001-fix-manual-delivery-mode-plan.md.
          output-mode: >-
            ${{
              (github.event.inputs.correlation-id != '' && 'working-dir')
              || (inputs.prompt != '' && 'working-dir')
              || (github.event_name == 'workflow_dispatch' && github.event.inputs.use-wiki-prompt == 'true' && 'branch-pr')
              || (github.event_name == 'schedule' && github.event.schedule == '0 20 * * 0' && 'branch-pr')
              || 'auto'
            }}
          prompt: ${{ env.PROMPT }}
          # Correlation-id-tagged dispatches (release-notes narration) post nothing to
          # GitHub: the narrator edits the release body directly, so suppression is
          # enforced here, not left to prompt compliance.
          response-mode: ${{ (github.event.inputs.correlation-id != '' && 'none') || inputs.response-mode || 'github' }}
          timeout: 0
