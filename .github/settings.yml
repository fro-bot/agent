---
_extends: .github:common-settings.yaml

repository:
  name: agent
  description: '@fro-bot Agent'
  topics:
    - fro-bot
    - agent
    - automation
    - actions
    - github-actions
    - github-app
    - bot

branches:
  - name: main
    protection:
      enforce_admins: true
      required_linear_history: true
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
      required_status_checks:
        strict: true
        contexts:
          - Analyze
          - Build
          - CodeQL
          - Dependency Review
          - Lint
          - Release
          - Test
          - Test GitHub Action
          - Setup
          - Renovate / Renovate

      restrictions: null

  - name: v?
    protection:
      enforce_admins: true
      allow_force_pushes: true
      required_linear_history: false
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: true
        require_last_push_approval: true
      required_status_checks: null
      restrictions: null

  - name: release
    protection:
      enforce_admins: true
      required_linear_history: false
      required_pull_request_reviews:
        required_approving_review_count: 1
        dismiss_stale_reviews: true
        require_code_owner_reviews: false
        require_last_push_approval: false
      required_status_checks: null
      restrictions: null
