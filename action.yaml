---
name: Fro Bot Agent
description: AI agent with persistent memory for GitHub automation
author: Fro Bot <agent@fro.bot>

inputs:
  github-token:
    description: GitHub token (App installation token or PAT) with write permissions
    required: true
  auth-json:
    description: JSON object mapping provider IDs to auth configs
    required: true
  prompt:
    description: Custom prompt for the agent
    required: false
  session-retention:
    description: Number of sessions to retain (default 50)
    required: false
    default: '50'
  s3-backup:
    description: Enable S3 write-through backup
    required: false
    default: 'false'
  s3-bucket:
    description: S3 bucket for backup (required if s3-backup is true)
    required: false
  aws-region:
    description: AWS region for S3 bucket
    required: false
  agent:
    description: 'Agent to use (default: sisyphus). Must be a primary agent, not subagent.'
    required: false
    default: sisyphus
  model:
    description: "Model override (format: provider/model). If not set, uses agent's configured model."
    required: false
  timeout:
    description: 'Execution timeout in milliseconds. 0 = no timeout. Default: 1800000 (30 minutes)'
    required: false
    default: '1800000'
  opencode-version:
    description: OpenCode CLI version to install if auto-setup is needed. Defaults to version pinned in source code if not set.
    required: false
  omo-version:
    description: oMo (Oh My OpenAgent) version to install if auto-setup is needed. Defaults to version pinned in source code if not set.
    required: false
  systematic-version:
    description: Systematic plugin version to register with OpenCode. Defaults to version pinned in source code if not set.
    required: false
  skip-cache:
    description: Skip session cache restore (default false)
    required: false
    default: 'false'
  omo-providers:
    description: >-
      Comma-separated list of oMo providers to enable. Values: claude, claude-max20,
      copilot, gemini, openai, opencode-zen, zai-coding-plan, kimi-for-coding.
      Default: empty (uses free OpenCode models)
    required: false
  opencode-config:
    description: >-
      JSON object to merge into the OpenCode config (OPENCODE_CONFIG_CONTENT).
      Values are merged on top of the autoupdate:false baseline; user values win on conflicts.
    required: false
  omo-config:
    description: >-
      Custom oMo configuration JSON. Written before installer runs.
      Deep-merged with existing config.
    required: false
  systematic-config:
    description: Custom Systematic plugin configuration JSON (deep-merged with existing config).
    required: false
  dedup-window:
    description: >-
      Deduplication window in milliseconds. Skip execution if the agent already
      ran for the same PR or issue within this window. 0 = disabled.
      Default: 600000 (10 minutes). Note: dedup is best-effort suppression
      via cache sentinels, not an in-flight lock. Use workflow-level
      concurrency groups to prevent overlapping same-entity runs.
    required: false
    default: '600000'

outputs:
  session-id:
    description: OpenCode session ID used for this run
  cache-status:
    description: Cache restore status (hit/miss/corrupted)
  duration:
    description: Run duration in seconds

runs:
  using: node24
  main: dist/main.js
  post: dist/post.js
