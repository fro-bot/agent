packages:
  - apps/*
  - packages/*

allowBuilds:
  simple-git-hooks: true
  unrs-resolver: true

autoInstallPeers: true

ignoreWorkspaceRootCheck: true

# Allow this specific, deliberately-upgraded SDK release past the
# minimum-release-age supply-chain gate. Safe to remove once the version
# ages past the cutoff.
minimumReleaseAgeExclude:
  - '@opencode-ai/sdk@1.17.6'

onlyBuiltDependencies:
  - esbuild
  - simple-git-hooks
  - unrs-resolver

overrides:
  brace-expansion: '>=5.0.6'
  fast-uri: '>=3.1.2'
  fast-xml-builder: '>=1.1.7'
  fast-xml-parser: '>=5.7.0'
  flatted: 3.4.2
  handlebars: '>=4.7.9'
  ip-address: '>=10.1.1'
  lodash: '>=4.18.0'
  lodash-es: '>=4.18.0'
  picomatch: '>=4.0.4'
  tar@^7: '>=7.5.11'
  undici@^7: '>=7.24.0'
  vite: 8.0.16
  yaml: '>=2.8.3'

savePrefix: ''

shamefullyHoist: true

shellEmulator: true

strictPeerDependencies: false
