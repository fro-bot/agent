# Bun configuration for the workspace.
# Workspace packages, overrides, and trustedDependencies live in package.json.

[install]
# Hoisted (flat) node_modules layout. The isolated linker places packages under
# non-portable `node_modules/.bun/<pkg>@<hash>/` paths, which makes TypeScript
# unable to name deep dependency types (TS2883 on eslint.config.ts referencing
# @eslint/core) and produces duplicate dependency instances. Hoisting keeps the
# toolchain's type resolution portable.
linker = "hoisted"

# Supply-chain age gate: refuse dependency versions published within this window.
# Mirrors the prior pnpm minimumReleaseAge policy. Seconds (3 days).
minimumReleaseAge = 259200

# Temporary fast-track: @opencode-ai/sdk 1.17.18 pairs with the released
# harness base (1.17.18+harness.4ec05a47) and clears the 3-day window at
# 2026-07-12T18:50Z. Remove this exclusion after that.
minimumReleaseAgeExcludes = ["@opencode-ai/sdk"]
